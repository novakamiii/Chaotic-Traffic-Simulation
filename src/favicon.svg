<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Car body -->
  <rect x="2" y="14" width="20" height="8" rx="2" fill="#e74c3c"/>
  <!-- Cabin -->
  <rect x="6" y="10" width="10" height="5" rx="1.5" fill="#88ccff" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="6" cy="23" r="2.5" fill="#111"/>
  <circle cx="18" cy="23" r="2.5" fill="#111"/>
  <!-- Headlight -->
  <circle cx="22" cy="17" r="1.2" fill="#ffff88"/>
  <!-- Pedestrian body -->
  <circle cx="27" cy="12" r="1.8" fill="#ffdbb5"/>
  <!-- Torso -->
  <line x1="27" y1="13.8" x2="27" y2="19" stroke="#3498db" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms flung up -->
  <line x1="27" y1="15" x2="23" y2="10" stroke="#ffdbb5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="15" x2="31" y2="9.5" stroke="#ffdbb5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs flying -->
  <line x1="27" y1="19" x2="23" y2="24" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="19" x2="31" y2="23" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Impact burst -->
  <line x1="24" y1="14" x2="20" y2="11" stroke="#ff4444" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="25" y1="12" x2="22" y2="8" stroke="#ff4444" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="26" y1="13" x2="24" y2="6" stroke="#ff4444" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Blood splatter -->
  <circle cx="24" cy="18" r="0.6" fill="#cc0000" opacity="0.6"/>
  <circle cx="22" cy="20" r="0.4" fill="#cc0000" opacity="0.4"/>
  <circle cx="23" cy="19.5" r="0.3" fill="#cc0000" opacity="0.5"/>
  <circle cx="25" cy="21" r="0.35" fill="#cc0000" opacity="0.3"/>
  <!-- Motion lines (car was moving right) -->
  <line x1="0" y1="16" x2="2" y2="16" stroke="#888" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="0" y1="19" x2="2" y2="19" stroke="#888" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="0" y1="21" x2="2" y2="21" stroke="#888" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
